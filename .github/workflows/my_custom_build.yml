name: 我的极速打包

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # 任务1：在 Ubuntu 服务器上极速打包 Android
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 👇👇👇 核心修复：把假签名直接放进 app/ 子目录里 👇👇👇
      - name: Create Fake Keystore for Bypassing
        run: |
          cd simple_live_app/android
          # 注意看下一行，我们改成了 app/fake_keystore.jks
          keytool -genkey -v -keystore app/fake_keystore.jks -storepass 123456 -alias myalias -keypass 123456 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Fake, OU=Fake, O=Fake, L=Fake, ST=Fake, C=US"
          echo "storeFile=fake_keystore.jks" > key.properties
          echo "storePassword=123456" >> key.properties
          echo "keyPassword=123456" >> key.properties
          echo "keyAlias=myalias" >> key.properties

      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

  # 任务2：在 Windows 服务器上打包 Windows
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean
      - name: Upload Windows to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip
